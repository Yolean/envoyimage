# Default config bundled with ghcr.io/yolean/envoy:echo-v<VERSION>.
#
# Listens on :8080 and exposes /q/envoy/echo via the bundled dynamic module.
# Other paths return 404 (no upstream cluster). Override --config-path or
# pass --config-yaml to plug your own routes; see README.md for a snippet
# that enables the echo filter inside an existing config.
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
  - name: main
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: default
              domains: ["*"]
              routes:
              - match: { prefix: "/" }
                direct_response:
                  status: 404
                  body:
                    inline_string: "not found\n"
          http_filters:
          - name: envoy.filters.http.dynamic_modules
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
              dynamic_module_config:
                name: yolean_envoy_echo
                do_not_close: true
              filter_name: echo
              filter_config:
                "@type": type.googleapis.com/google.protobuf.StringValue
                value: |
                  {"path": "/q/envoy/echo"}
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
